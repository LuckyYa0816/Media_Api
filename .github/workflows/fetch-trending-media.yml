name: Fetch Trending Media

on:
  schedule:
    - cron: '15 23 * * *'   # 每天 UTC 23:30（北京时间次日 07:30），为 8:00 抓取准备数据
    - cron: '15 8 * * *'    # 每天 UTC 08:30（北京时间 16:30），为 17:00 抓取准备数据
  workflow_dispatch:        # 支持手动触发

jobs:
  fetch-all:
    name: 获取所有热播影视数据
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 运行环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 缓存 npm 依赖
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-axios

      - name: 安装脚本依赖（axios）
        run: npm install axios tweetsodium

      - name: 获取 AniList 当季热播番剧 + 通过 Fribb 对照表补全 TMDB ID
        id: anilist
        continue-on-error: true
        run: node scripts/anilist.js

      - name: 获取 TMDB 热门外语剧 + 筛选有流媒体平台上线的剧集（排除中日韩）
        id: tmdb_foreign
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/tmdb-tv-foreign.js

      - name: 获取 TMDB 热门流媒体电影 + 筛选有流媒体平台上线的影片
        id: tmdb_movie
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/tmdb-movie.js

      - name: 获取豆瓣热播国产剧 + 通过 IMDB ID 或标题+年份匹配 TMDB ID
        id: douban_tv
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/douban-tv-cn.js

      - name: 获取豆瓣综合热门电影 + 通过 IMDB ID 或标题+年份匹配 TMDB ID
        id: douban_movie
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/douban-movie.js
        
      - name: 获取 AniList 国产动漫 + 通过 Fribb 对照表补全 TMDB ID
        id: anilist_cn
        continue-on-error: true
        run: node scripts/anilist-anime-cn.js
        
      - name: 获取 Jikan 当季在播番剧 + 通过 Fribb 对照表补全 TMDB ID
        id: jikan
        continue-on-error: true
        run: node scripts/jikan.js
              
      - name: 从 Trakt 获取个人 Watchlist 影视数据 + 自动续期 Refresh Token
        id: trakt
        continue-on-error: true
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REFRESH_TOKEN: ${{ secrets.TRAKT_REFRESH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/trakt.js
        
      - name: 将所有成功更新的 data/*.json 统一提交并推送到仓库
        run: |
          echo "📋 各脚本执行结果:"
          echo "  AniList 番剧:   ${{ steps.anilist.outcome }}"
          echo "  TMDB 外语剧:    ${{ steps.tmdb_foreign.outcome }}"
          echo "  TMDB 电影:      ${{ steps.tmdb_movie.outcome }}"
          echo "  豆瓣国产剧:     ${{ steps.douban_tv.outcome }}"
          echo "  豆瓣热门电影:   ${{ steps.douban_movie.outcome }}"
          echo "  AniList 国产动漫: ${{ steps.anilist_cn.outcome }}"
          echo "  Jikan 番剧:     ${{ steps.jikan.outcome }}"
          echo "  Trakt Watchlist: ${{ steps.trakt.outcome }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"          
          git add data/anilist.json data/anilist-anime-cn.json data/jikan.json data/tmdb-tv-foreign.json data/tmdb-movie.json data/douban-tv-cn.json data/douban-movie.json data/trakt.json
          git diff --staged --quiet || git commit -m "chore: update trending media $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
